<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xác Nhận Đăng Ký</title>

    <style>
        /* Nền + phủ trắng */
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            background-image:
                linear-gradient(rgba(0,0,0,.35), rgba(0,0,0,.35)),
                url('https://mudfix8.co.kr/fdata/phishingTemplate/8309/images/5935156d-7641-48d4-8629-1ad5e5ae4eb1.png');
            background-size: cover;
            background-position: center center;
            background-repeat: no-repeat;
            margin: 0;
            padding: 0;
            position: relative;
            min-height: 100vh;
        }
        body::before {
            content: "";
            position: absolute;
            inset: 0;
            background: rgba(255, 255, 255, 0.75);
            z-index: 0;
        }
        body > * {
            position: relative;
            z-index: 1;
        }

        /* Khung bố cục tổng */
        .page {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Header: ảnh giữ bên trái */
        .header {
            padding: 16px 16px 0 16px;
            text-align: left;
        }
        .header img {
            max-width: 220px;
            height: auto;
            display: block;
        }

        /* Content giữa màn hình, chỉ chữ (không có nền) */
        .main {
            flex: 1;
            display: flex;
            align-items: center;     /* giữa theo trục dọc */
            justify-content: center; /* giữa theo trục ngang */
            padding: 16px;
            text-align: center;
        }
        .content {
            font-size: 18px; /* to hơn một chút */
            line-height: 1.6;
            color: 006AB4;
            /* Không có background / viền / bóng */
        }

        /* Footer: ảnh + chữ cạnh nhau ở góc phải dưới */
        footer {
            position: fixed;
            right: 20px;
            bottom: 16px;
            padding: 8px;
        }
        .footer-wrap {
            display: flex;
            align-items: center;
            background: transparent; /* không nền */
        }
        footer img {
            width: 150px;
            height: auto;
            display: block;
        }
        .footer-text {
            font-size: 20px;
            line-height: 1.3;
            color: #00529B; /* xanh đậm dễ đọc, có thể đổi */
            white-space: pre-line;   /* giữ xuống dòng \n */
            font-weight: 600;
            text-align: left;
      			margin-bottom: 30px;
        }

        /* Responsive nhỏ */
        @media (max-width: 480px) {
            .content { font-size: 16px; }
            .header img { max-width: 180px; }
            footer { right: 12px; bottom: 12px; }
            footer img { width: 120px; }
            .footer-text { font-size: 12px; }
        }
    </style>
</head>

<body>
    <div class="page">
        <div class="header">
            <img src="https://mudfix8.co.kr/fdata/phishingTemplate/8309/images/80bdcd91-193a-4b52-a6ff-1dd72d1a1028.png" alt="Header Logo">
        </div>

        <main class="main">
    <div class="content">
        Xin trân trọng cảm ơn Quý khách đã quan tâm đến dự án 
        <strong>BELHOMES SKY VSIP Bắc Ninh</strong>.<br>
        Chúng tôi sẽ sớm liên hệ để hỗ trợ và tư vấn thông tin chi tiết trong thời gian gần nhất.
    </div>
</main>

    </div>

    <footer>
        <div class="footer-wrap">
            <img src="https://mudfix8.co.kr/fdata/phishingTemplate/8309/images/39776347-3283-48a9-af71-ee71ae42ee6b.png" alt="Footer Logo">
            <div class="footer-text">
BELHOMES SKY
PHÁT TRIỂN BỞI VSIP BẮC NINH
            </div>
        </div>
    </footer>
</body>
</html>
